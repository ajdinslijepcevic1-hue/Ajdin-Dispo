<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tourendispo Prozessor</title>
    <!-- Tailwind CSS für das Design -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel für Browser-Kompilierung -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Excel Bibliothek -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { background-color: #f3f4f6; }
        .output-text {
            font-family: 'Calibri', sans-serif;
            font-size: 11pt;
            white-space: pre;
            text-align: left;
            color: #000000;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const excelDateToJSDate = (serial) => {
            const utc_days = Math.floor(serial - 25569);
            const utc_value = utc_days * 86400;
            const date_info = new Date(utc_value * 1000);
            const fractional_day = serial - Math.floor(serial) + 0.0000001;
            let total_seconds = Math.floor(86400 * fractional_day);
            const seconds = total_seconds % 60;
            total_seconds -= seconds;
            const hours = Math.floor(total_seconds / (60 * 60));
            const minutes = Math.floor(total_seconds / 60) % 60;
            return new Date(date_info.getFullYear(), date_info.getMonth(), date_info.getDate(), hours, minutes, seconds);
        };

        const App = () => {
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const fileInputRef = useRef(null);

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setLoading(true);
                setError(null);

                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const bstr = evt.target.result;
                        const wb = XLSX.read(bstr, { type: 'binary' });
                        const ws = wb.Sheets[wb.SheetNames[0]];
                        const jsonData = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
                        processExcelData(jsonData);
                    } catch (err) {
                        setError("Fehler beim Verarbeiten der Datei.");
                        setLoading(false);
                    }
                };
                reader.readAsBinaryString(file);
            };

            const processExcelData = (rows) => {
                if (rows.length < 5) {
                    setError("Die Datei enthält zu wenig Daten.");
                    setLoading(false);
                    return;
                }

                let colMap = { date: 0, memo: 2, order: 3, customer: 4, project: 5, street: 9, zip: 10, city: 11 };
                
                for (let i = 0; i < Math.min(rows.length, 15); i++) {
                    const row = rows[i];
                    if (!row) continue;
                    row.forEach((cell, idx) => {
                        const val = String(cell).toLowerCase().trim();
                        if (val === "lieferdatum") colMap.date = idx;
                        if (val === "memo") colMap.memo = idx;
                        if (val === "auftrag") colMap.order = idx;
                        if (val === "kunde") colMap.customer = idx;
                        if (val === "projekt") colMap.project = idx;
                        if (val === "strasse") colMap.street = idx;
                        if (val === "plz") colMap.zip = idx;
                        if (val === "ort") colMap.city = idx;
                    });
                }

                const deliveryGroups = {
                    1: { name: "Montag", items: [], date: null },
                    2: { name: "Dienstag", items: [], date: null },
                    3: { name: "Mittwoch", items: [], date: null },
                    4: { name: "Donnerstag", items: [], date: null },
                    5: { name: "Freitag", items: [], date: null }
                };

                const SPACES = " ".repeat(30);

                for (let i = 9; i < rows.length; i++) {
                    const row = rows[i];
                    if (!row || row.length < 2) continue;

                    const rawDate = row[colMap.date];
                    if (rawDate) {
                        const date = typeof rawDate === 'number' ? excelDateToJSDate(rawDate) : new Date(rawDate);
                        if (!isNaN(date.getTime())) {
                            const dayOfWeek = date.getDay();
                            if (deliveryGroups[dayOfWeek]) {
                                if (!deliveryGroups[dayOfWeek].date) deliveryGroups[dayOfWeek].date = date;

                                const fixed = "LIEFERUNG";
                                const block1 = (row[colMap.customer] || "").toString().trim();
                                const strasse = (row[colMap.street] || "").toString().trim();
                                const plz = (row[colMap.zip] || "").toString().trim();
                                const ort = (row[colMap.city] || "").toString().trim();
                                
                                let block2 = "KEINE ADRESSE GEFUNDEN";
                                if (strasse || plz || ort) {
                                    block2 = `${strasse}, ${plz} ${ort}`.trim().replace(/^, /, "");
                                }

                                const block3 = (row[colMap.memo] || "").toString().trim();
                                const auftragNum = (row[colMap.order] || "").toString().trim();
                                const block5 = `${auftragNum}/SLI`;

                                const formattedLine = `${fixed}${SPACES}${block1}${SPACES}${block2}${SPACES}${block3}${SPACES}${block5}`;
                                deliveryGroups[dayOfWeek].items.push(formattedLine);
                            }
                        }
                    }
                }

                setData([1, 2, 3, 4, 5].map(day => deliveryGroups[day]));
                setLoading(false);
            };

            const formatDate = (date) => {
                if (!date) return "";
                return `${String(date.getDate()).padStart(2, '0')}.${String(date.getMonth() + 1).padStart(2, '0')}.${date.getFullYear()}`;
            };

            const handleCopy = () => {
                const text = document.getElementById('output-area').innerText;
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-full mx-auto bg-white rounded-2xl shadow-xl p-8">
                        <h1 className="text-2xl font-black text-center mb-8 text-blue-900 uppercase italic">Tourendispo GitHub Edition</h1>
                        
                        <div 
                            className="border-4 border-dashed border-gray-200 rounded-xl p-12 text-center mb-8 bg-gray-50 hover:border-blue-400 cursor-pointer transition-all"
                            onClick={() => fileInputRef.current.click()}
                        >
                            <p className="text-lg font-bold text-gray-600">Excel-Datei hier hochladen</p>
                            <input type="file" ref={fileInputRef} onChange={handleFileUpload} accept=".xlsx" className="hidden" />
                        </div>

                        {loading && <p className="text-center font-bold text-blue-900 animate-pulse">Verarbeite Daten...</p>}
                        {error && <p className="text-red-500 text-center font-bold">{error}</p>}

                        {data && (
                            <div>
                                <div className="flex justify-between items-center mb-6 bg-blue-950 p-4 rounded-xl">
                                    <span className="text-white font-mono text-sm uppercase">30 Spaces Format</span>
                                    <button onClick={handleCopy} className="bg-white text-blue-950 px-10 py-2 rounded-lg font-black hover:bg-gray-100 transition-all">KOPIEREN</button>
                                </div>
                                
                                <div id="output-area" className="bg-white p-10 border border-gray-200 rounded-lg shadow-inner overflow-x-auto output-text">
                                    {data.map((group, idx) => {
                                        if (group.items.length === 0) return null;
                                        return (
                                            <div key={idx} className="mb-12">
                                                <div className="font-bold border-b-2 border-blue-100 pb-2 mb-4 text-blue-900 text-lg">
                                                    {group.name} {formatDate(group.date)} ({group.items.length} Lieferungen):
                                                </div>
                                                {group.items.map((item, i) => (
                                                    <div key={i} className="py-0.5 hover:bg-gray-50">{item}</div>
                                                ))}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
